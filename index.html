// ============== STORAGE LAYER (localStorage per v1 demo) ==============
const STORAGE_PREFIX = 'quadratura:';
const db = {
  async get(date) {
    try {
      const v = localStorage.getItem(`${STORAGE_PREFIX}${date}`);
      return v ? JSON.parse(v) : null;
    } catch { return null; }
  },
  async set(date, data) {
    try {
      localStorage.setItem(`${STORAGE_PREFIX}${date}`, JSON.stringify(data));
      return true;
    } catch { return false; }
  },
  async delete(date) {
    try { localStorage.removeItem(`${STORAGE_PREFIX}${date}`); return true; }
    catch { return false; }
  },
  async list() {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(STORAGE_PREFIX)) keys.push(k);
      }
      return keys;
    } catch { return []; }
  },
  async getAll() {
    const keys = await this.list();
    const items = [];
    for (const k of keys) {
      const date = k.replace(STORAGE_PREFIX, '');
      const data = await this.get(date);
      if (data) items.push({ date, ...data });
    }
    return items.sort((a, b) => b.date.localeCompare(a.date));
  },
  async importBatch(records) {
    let added = 0, updated = 0;
    for (const rec of records) {
      if (!rec.date) continue;
      const existing = await this.get(rec.date);
      const { date, ...rest } = rec;
      await this.set(date, rest);
      if (existing) updated++; else added++;
    }
    return { added, updated };
  }
};

// ============== HELPERS ==============
const fmtEur = (n) => {
  if (n === 0 || n === null || n === undefined || isNaN(n)) return '—';
  return new Intl.NumberFormat('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n) + ' €';
};
const fmtEurZero = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '0,00 €';
  return new Intl.NumberFormat('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n) + ' €';
};
const fmtDateIT = (iso) => {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
};
// FIX: usa data locale (non UTC) per evitare slittamenti di giorno con il fuso orario
const toLocalISO = (date) => {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
};
const today = () => toLocalISO(new Date());
const monthName = (m) => ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'][m];

const emptyQuadratura = () => ({
  operatori: '',
  apertura: { cassaforte: '', glory: '' },
  // Modalità di pagamento (con cosa hanno pagato i clienti)
  incassi: {
    contanti: '',
    pos: '',
    satispay: '',
    ticket: '',
    buoniResiRiscossi: '',  // buoni dati al cliente per resi, ora riscossi
    buoniIndustriali: '',   // buoni emessi da industria/produttore
    arrotondamenti: ''      // rettifica netta glory ±1c/2c (può essere negativa)
  },
  // Corrispettivi (cosa ha venduto il negozio)
  corrispettivi: '',
  pagopa: '',     // pagamenti per bollette/ATER (passanti)
  resiEmessi: '', // resi emessi al cliente (sommati al corrispettivo per la quadratura)
  movimenti: {
    consegnaMonete: '',
    speseCash: '',
    versamentoBanca: '',
    rimborsiCash: '',
    ritiroValori: ''
  },
  interni: { rifornimentoGlory: '', svuotamentoGlory: '' },
  fisico: { cassaforte: '', glory: '' },
  note: ''
});

const num = (v) => {
  const n = parseFloat(String(v).replace(',', '.'));
  return isNaN(n) ? 0 : n;
};

const calc = (q) => {
  const a = q.apertura || {};
  const i = q.incassi || {};
  const m = q.movimenti || {};
  const x = q.interni || {};
  const f = q.fisico || {};

  const apCassaforte = num(a.cassaforte);
  const apGlory = num(a.glory);
  const totApertura = apCassaforte + apGlory;

  // Modalità di pagamento
  const inContanti = num(i.contanti);
  const inPos = num(i.pos);
  const inSatispay = num(i.satispay);
  const inTicket = num(i.ticket);
  const inBuoniResiRiscossi = num(i.buoniResiRiscossi);
  const inBuoniIndustriali = num(i.buoniIndustriali);
  const inArrotondamenti = num(i.arrotondamenti); // può essere negativo
  const totIncassi = inContanti + inPos + inSatispay + inTicket
    + inBuoniResiRiscossi + inBuoniIndustriali + inArrotondamenti;
  // Arrotondamenti: sommati col proprio segno (negativo sottrae, positivo aggiunge)

  // Corrispettivi
  const corrispettivi = num(q.corrispettivi);
  const pagopa = num(q.pagopa);
  const resiEmessi = num(q.resiEmessi);
  const totCorrispettivi = corrispettivi + pagopa + resiEmessi;
  const quadraturaIncassi = totCorrispettivi - totIncassi;

  const consegnaMonete = num(m.consegnaMonete);
  const speseCash = num(m.speseCash);
  const versamentoBanca = num(m.versamentoBanca);
  const rimborsiCash = num(m.rimborsiCash);
  const ritiroValori = num(m.ritiroValori);

  const rifornimentoGlory = num(x.rifornimentoGlory);
  const svuotamentoGlory = num(x.svuotamentoGlory);

  const teoricoCassaforte = apCassaforte
    + consegnaMonete
    + svuotamentoGlory
    - speseCash
    - versamentoBanca
    - rimborsiCash
    - rifornimentoGlory;

  // Glory teorica: include arrotondamenti (rettifica del contante in glory)
  const teoricoGlory = apGlory
    + inContanti
    + inArrotondamenti
    + rifornimentoGlory
    - ritiroValori
    - svuotamentoGlory;

  const teoricoTot = teoricoCassaforte + teoricoGlory;

  const fisCassaforte = num(f.cassaforte);
  const fisGlory = num(f.glory);
  const fisicoTot = fisCassaforte + fisGlory;

  const diffCassaforte = teoricoCassaforte - fisCassaforte;
  const diffGlory = teoricoGlory - fisGlory;
  const quadraturaContante = teoricoTot - fisicoTot;

  return {
    apCassaforte, apGlory, totApertura,
    inContanti, inPos, inSatispay, inTicket,
    inBuoniResiRiscossi, inBuoniIndustriali, inArrotondamenti,
    totIncassi, corrispettivi, pagopa, resiEmessi, totCorrispettivi, quadraturaIncassi,
    teoricoCassaforte, teoricoGlory, teoricoTot,
    fisCassaforte, fisGlory, fisicoTot,
    diffCassaforte, diffGlory, quadraturaContante
  };
};

    let mounted = true;
    (async () => {
      setLoading(true);
      const data = await db.get(date);
      const empty = emptyQuadratura();
      if (mounted) {
        if (data) {
          setQ({ ...empty, ...data,
            apertura: { ...empty.apertura, ...(data.apertura || {}) },
            incassi: { ...empty.incassi, ...(data.incassi || {}) },
            movimenti: { ...empty.movimenti, ...(data.movimenti || {}) },
            interni: { ...empty.interni, ...(data.interni || {}) },
            fisico: { ...empty.fisico, ...(data.fisico || {}) }

          setExisting(true);
        } else {
          setQ(empty);
          setExisting(false);
        }
        setLoading(false);

    })();
    return () => { mounted = false; };
  }, [date]);

    setQ(prev => {
      const next = { ...prev };
      const keys = path.split('.');

      for (let i = 0; i < keys.length - 1; i++) {
        target[keys[i]] = { ...target[keys[i]] };
        target = target[keys[i]];
      }
      target[keys[keys.length - 1]] = value;
      return next;
    });
    setSaved(false);

    const dataToSave = { ...q, updatedAt: new Date().toISOString() };

// ============== CALENDARIO ==============
const Calendario = ({ items, onSelect, selectedDate }) => {
  const [month, setMonth] = useState(new Date().getMonth());
  const [year, setYear] = useState(new Date().getFullYear());

  const itemsByDate = useMemo(() => {
    const map = {};
    items.forEach(it => {
      const c = calc(it);
      const ok = Math.abs(c.quadraturaContante) < 0.02 && Math.abs(c.quadraturaIncassi) < 0.02;
      map[it.date] = { exists: true, ok };
    });
    return map;
  }, [items]);

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startWeekday = (firstDay.getDay() + 6) % 7;

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const iso = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    cells.push({ day: d, iso, info: itemsByDate[iso] });
  }

  return (
    <div className="bg-white border border-slate-200 rounded-lg overflow-hidden">
      <div className="px-4 py-3 border-b border-slate-200 bg-slate-50 flex items-center justify-between">
        <button onClick={() => {
          if (month === 0) { setMonth(11); setYear(year - 1); } else setMonth(month - 1);
        }} className="p-1.5 hover:bg-slate-200 rounded transition">
          <ChevronLeft size={18} />
        </button>
        <div className="font-semibold text-slate-800">{monthName(month)} {year}</div>
        <button onClick={() => {
          if (month === 11) { setMonth(0); setYear(year + 1); } else setMonth(month + 1);
        }} className="p-1.5 hover:bg-slate-200 rounded transition">
          <ChevronRight size={18} />
        </button>
      </div>
      <div className="p-3">
        <div className="grid grid-cols-7 gap-1 mb-2">
          {['L','M','M','G','V','S','D'].map((d, i) => (
            <div key={i} className="text-center text-xs font-semibold text-slate-400 py-1">{d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((cell, i) => {
            if (!cell) return <div key={i} />;
            const isSelected = cell.iso === selectedDate;
            const isToday = cell.iso === today();
            const hasData = cell.info?.exists;
            const isOk = hasData && cell.info.ok;
            return (
              <button key={i} onClick={() => onSelect(cell.iso)}
                className={`
                  aspect-square rounded-md text-sm font-medium relative transition
                  ${isSelected ? 'bg-slate-900 text-white' :
                    hasData ? (isOk ? 'bg-emerald-50 text-emerald-800 hover:bg-emerald-100 border border-emerald-200' : 'bg-rose-50 text-rose-800 hover:bg-rose-100 border border-rose-200') :
                    'hover:bg-slate-100 text-slate-700'}
                  ${isToday && !isSelected ? 'ring-2 ring-slate-400' : ''}
                `}>
                {cell.day}
                {hasData && !isSelected && (
                  <div className={`absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full ${isOk ? 'bg-emerald-500' : 'bg-rose-500'}`} />
                )}
              </button>
            );
          })}
        </div>
        <div className="flex items-center gap-4 mt-4 pt-3 border-t border-slate-100 text-xs text-slate-500">
          <div className="flex items-center gap-1.5">
            <div className="w-2 h-2 rounded-full bg-emerald-500" /> Tutto quadrato
          </div>
          <div className="flex items-center gap-1.5">
            <div className="w-2 h-2 rounded-full bg-rose-500" /> Squadratura
          </div>
        </div>
      </div>
    </div>
  );
};

const Archivio = ({ items, onSelect }) => {

      const c = calc(it);
      const ok = Math.abs(c.quadraturaContante) < 0.02 && Math.abs(c.quadraturaIncassi) < 0.02;
      const matchSearch = !search ||
        it.date.includes(search) ||
        (it.operatori || '').toLowerCase().includes(search.toLowerCase());
      const matchFilter = filter === 'all' ||
        (filter === 'ok' && ok) ||
        (filter === 'ko' && !ok);
      return matchSearch && matchFilter;
    });
  }, [items, search, filter]);

  return (
    <div className="space-y-4">

// ============== STATISTICHE ==============
const Statistiche = ({ items }) => {
  const [periodo, setPeriodo] = useState('30');

  const filteredItems = useMemo(() => {
    const days = parseInt(periodo);
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - days);
    const cutoffStr = toLocalISO(cutoff);
    return items.filter(it => it.date >= cutoffStr).sort((a, b) => a.date.localeCompare(b.date));
  }, [items, periodo]);

  const chartData = useMemo(() => filteredItems.map(it => {
    const c = calc(it);
    return {
      date: it.date.slice(5).replace('-', '/'),
      quadraturaContante: Math.abs(c.quadraturaContante) < 0.02 ? 0 : c.quadraturaContante,
      contanti: c.inContanti,
      pos: c.inPos,
      satispay: c.inSatispay,
      ticket: c.inTicket,
      buoniResiRiscossi: c.inBuoniResiRiscossi,
      buoniIndustriali: c.inBuoniIndustriali
    };
  }), [filteredItems]);

  const stats = useMemo(() => {
    let okGiorni = 0, koContante = 0, koIncassi = 0;
    let totAmmanco = 0, totEccedenza = 0;
    let totContanti = 0, totPos = 0, totSatispay = 0, totTicket = 0;
    let totBuoniResiRiscossi = 0, totBuoniIndustriali = 0;
    let totPagopa = 0, totIncassiAll = 0;
    filteredItems.forEach(it => {
      const c = calc(it);
      const okContante = Math.abs(c.quadraturaContante) < 0.02;
      const okIncassi = Math.abs(c.quadraturaIncassi) < 0.02;
      if (okContante && okIncassi) okGiorni++;
      if (!okContante) {
        koContante++;
        if (c.quadraturaContante < 0) totAmmanco += Math.abs(c.quadraturaContante);
        else totEccedenza += c.quadraturaContante;
      }
      if (!okIncassi) koIncassi++;
      totContanti += c.inContanti; totPos += c.inPos; totSatispay += c.inSatispay;
      totTicket += c.inTicket;
      totBuoniResiRiscossi += c.inBuoniResiRiscossi;
      totBuoniIndustriali += c.inBuoniIndustriali;
      totPagopa += c.pagopa;
      totIncassiAll += c.totIncassi;
    });
    return { tot: filteredItems.length, okGiorni, koContante, koIncassi,
      totAmmanco, totEccedenza, totContanti, totPos, totSatispay, totTicket,
      totBuoniResiRiscossi, totBuoniIndustriali,
      totPagopa, totIncassiAll };
  }, [filteredItems]);

  const mixData = useMemo(() => [
    { name: 'Contanti', value: stats.totContanti, color: '#0f172a' },
    { name: 'POS', value: stats.totPos, color: '#3b82f6' },
    { name: 'Satispay', value: stats.totSatispay, color: '#f97316' },
    { name: 'Ticket', value: stats.totTicket, color: '#10b981' },
    { name: 'B. resi risc.', value: stats.totBuoniResiRiscossi, color: '#8b5cf6' },
    { name: 'B. industriali', value: stats.totBuoniIndustriali, color: '#14b8a6' }
  ].filter(d => d.value > 0), [stats]);

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <h3 className="text-lg font-semibold text-slate-900">Statistiche periodo</h3>
        <div className="flex items-center gap-1 bg-white border border-slate-200 rounded-md p-1">
          {[{ v: '7', l: '7 giorni' },{ v: '30', l: '30 giorni' },{ v: '90', l: '3 mesi' },{ v: '365', l: 'Anno' }].map(opt => (
            <button key={opt.v} onClick={() => setPeriodo(opt.v)}
              className={`px-3 py-1.5 text-xs font-medium rounded transition ${
                periodo === opt.v ? 'bg-slate-900 text-white' : 'text-slate-600 hover:bg-slate-100'
              }`}>{opt.l}</button>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div className="bg-white border border-slate-200 rounded-lg p-4">
          <div className="text-xs uppercase tracking-wider text-slate-500 font-semibold">Giornate OK</div>
          <div className="text-2xl font-bold text-emerald-700 mt-1">{stats.okGiorni}<span className="text-sm font-normal text-slate-400">/{stats.tot}</span></div>
          <div className="text-xs text-slate-500 mt-1">{stats.tot > 0 ? `${Math.round(stats.okGiorni / stats.tot * 100)}%` : '—'}</div>
        </div>
        <div className="bg-white border border-slate-200 rounded-lg p-4">
          <div className="text-xs uppercase tracking-wider text-slate-500 font-semibold">KO Contante</div>
          <div className="text-2xl font-bold text-rose-700 mt-1">{stats.koContante}</div>
          <div className="text-xs text-slate-500 mt-1 font-mono">Amm: {fmtEur(stats.totAmmanco)}</div>
        </div>
        <div className="bg-white border border-slate-200 rounded-lg p-4">
          <div className="text-xs uppercase tracking-wider text-slate-500 font-semibold">KO Incassi</div>
          <div className="text-2xl font-bold text-amber-700 mt-1">{stats.koIncassi}</div>
          <div className="text-xs text-slate-500 mt-1">Mismatch corrispettivi</div>
        </div>
        <div className="bg-white border border-slate-200 rounded-lg p-4">
          <div className="text-xs uppercase tracking-wider text-slate-500 font-semibold">Incassi totali</div>
          <div className="text-2xl font-bold text-slate-900 mt-1 font-mono">{fmtEur(stats.totIncassiAll)}</div>
          <div className="text-xs text-slate-500 mt-1">Tutte le forme</div>
        </div>
      </div>

      {chartData.length > 1 && (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div className="bg-white border border-slate-200 rounded-lg p-4">
            <div className="text-sm font-semibold text-slate-800 mb-4">Andamento quadratura contante</div>
            <ResponsiveContainer width="100%" height={220}>
              <LineChart data={chartData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                <XAxis dataKey="date" tick={{ fontSize: 11 }} stroke="#94a3b8" />
                <YAxis tick={{ fontSize: 11 }} stroke="#94a3b8" tickFormatter={v => `${v}€`} />
                <Tooltip formatter={v => fmtEur(v)}
                  contentStyle={{ background: '#0f172a', border: 'none', borderRadius: 6, color: 'white', fontSize: 12 }} />
                <ReferenceLine y={0} stroke="#64748b" strokeWidth={1} />
                <Line type="monotone" dataKey="quadraturaContante" stroke="#0f172a" strokeWidth={2} dot={{ fill: '#0f172a', r: 3 }} name="Quadratura" />
              </LineChart>
            </ResponsiveContainer>
          </div>

          {mixData.length > 0 && (
            <div className="bg-white border border-slate-200 rounded-lg p-4">
              <div className="text-sm font-semibold text-slate-800 mb-4">Mix forme di pagamento</div>
              <ResponsiveContainer width="100%" height={220}>
                <PieChart>
                  <Pie data={mixData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={75} innerRadius={40} paddingAngle={2}>
                    {mixData.map((entry, i) => <Cell key={i} fill={entry.color} />)}
                  </Pie>
                  <Tooltip formatter={v => fmtEur(v)}
                    contentStyle={{ background: '#0f172a', border: 'none', borderRadius: 6, color: 'white', fontSize: 12 }} />
                </PieChart>
              </ResponsiveContainer>
              <div className="grid grid-cols-2 gap-2 mt-2 text-xs">
                {mixData.map(d => (
                  <div key={d.name} className="flex items-center gap-2">
                    <div className="w-3 h-3 rounded-sm" style={{ background: d.color }} />
                    <span className="text-slate-600">{d.name}</span>
                    <span className="ml-auto font-mono font-semibold text-slate-800">{fmtEur(d.value)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {chartData.length > 1 && (
        <div className="bg-white border border-slate-200 rounded-lg p-4">
          <div className="text-sm font-semibold text-slate-800 mb-4">Incassi giornalieri per forma di pagamento</div>
          <ResponsiveContainer width="100%" height={250}>
            <BarChart data={chartData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
              <XAxis dataKey="date" tick={{ fontSize: 11 }} stroke="#94a3b8" />
              <YAxis tick={{ fontSize: 11 }} stroke="#94a3b8" tickFormatter={v => `${v}€`} />
              <Tooltip formatter={v => fmtEur(v)}
                contentStyle={{ background: '#0f172a', border: 'none', borderRadius: 6, color: 'white', fontSize: 12 }} />
              <Bar dataKey="contanti" stackId="a" fill="#0f172a" name="Contanti" />
              <Bar dataKey="pos" stackId="a" fill="#3b82f6" name="POS" />
              <Bar dataKey="satispay" stackId="a" fill="#f97316" name="Satispay" />
              <Bar dataKey="ticket" stackId="a" fill="#10b981" name="Ticket" />
              <Bar dataKey="buoniResiRiscossi" stackId="a" fill="#8b5cf6" name="B. resi riscossi" />
              <Bar dataKey="buoniIndustriali" stackId="a" fill="#14b8a6" name="B. industriali" />
            </BarChart>
          </ResponsiveContainer>
        </div>
      )}

      {chartData.length === 0 && (
        <div className="bg-white border border-slate-200 rounded-lg p-12 text-center text-slate-500">
          <BarChart3 size={32} className="mx-auto mb-2 text-slate-300" />
          <div className="text-sm">Nessun dato nel periodo selezionato</div>
        </div>
      )}
    </div>
  );
};

function App() {

  const [refreshKey, setRefreshKey] = useState(0);
  const [exportMenuOpen, setExportMenuOpen] = useState(false);
  const [rangeFrom, setRangeFrom] = useState('');
  const [rangeTo, setRangeTo] = useState('');
  const [lastExportDate, setLastExportDate] = useState(() => localStorage.getItem('lastExportDate') || '');

  // Aggiorna data ultimo export quando cambia (per banner promemoria)
  useEffect(() => {
    if (lastExportDate) localStorage.setItem('lastExportDate', lastExportDate);
  }, [lastExportDate]);

  // Quadratura di oggi presente ma non ancora esportata?
  const todayQuadraturaExists = useMemo(() => items.some(it => it.date === today()), [items]);
  const showExportReminder = todayQuadraturaExists && lastExportDate !== today();

  useEffect(() => {
    (async () => {
      const all = await db.getAll();
      setItems(all);
    })();
  }, [refreshKey]);

  const handleSaved = () => setRefreshKey(k => k + 1);

  const exportJSON = async () => {
    const all = await db.getAll();
    const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `quadrature_${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // Conversione record → riga Excel piatta (per il foglio riepilogo orizzontale)
  const flattenForExcel = (it) => {
    const c = calc(it);
    const okIncassi = Math.abs(c.quadraturaIncassi) < 0.02;
    const okContante = Math.abs(c.quadraturaContante) < 0.02;
    const [yy, mm, dd] = (it.date || '').split('-').map(Number);
    const dataDate = (yy && mm && dd) ? new Date(yy, mm - 1, dd) : null;
    return {
      'Data': dataDate || it.date || '',
      'Operatori': it.operatori || '',
      'Contanti': num(it.incassi?.contanti),
      'POS': num(it.incassi?.pos),
      'Satispay': num(it.incassi?.satispay),
      'Ticket': num(it.incassi?.ticket),
      'Buoni resi riscossi': num(it.incassi?.buoniResiRiscossi),
      'Buoni industriali': num(it.incassi?.buoniIndustriali),
      'Arrotondamenti': num(it.incassi?.arrotondamenti),
      'Totale incassi': c.totIncassi,
      'Corrispettivi scontrini': c.corrispettivi,
      'PagoPA': c.pagopa,
      'Resi emessi': c.resiEmessi,
      'Totale corrispettivi': c.totCorrispettivi,
      'Quadr. incassi': c.quadraturaIncassi,
      'Esito incassi': okIncassi ? 'OK' : 'KO',
      'Apertura cassaforte': c.apCassaforte,
      'Apertura glory': c.apGlory,
      'Consegna monete': num(it.movimenti?.consegnaMonete),
      'Spese cash': num(it.movimenti?.speseCash),
      'Versamento banca': num(it.movimenti?.versamentoBanca),
      'Rimborsi cash': num(it.movimenti?.rimborsiCash),
      'Ritiro valori': num(it.movimenti?.ritiroValori),
      'Rifornimento glory': num(it.interni?.rifornimentoGlory),
      'Svuotamento glory': num(it.interni?.svuotamentoGlory),
      'Teorico cassaforte': c.teoricoCassaforte,
      'Teorico glory': c.teoricoGlory,
      'Fisico cassaforte': c.fisCassaforte,
      'Fisico glory': c.fisGlory,
      'Diff. cassaforte': c.diffCassaforte,
      'Diff. glory': c.diffGlory,
      'Quadr. contante': c.quadraturaContante,
      'Esito contante': okContante ? 'OK' : 'KO',
      'Stato giornata': (okIncassi && okContante) ? 'OK' : 'KO',
      'Note': it.note || ''
    };
  };

  // ===== FOGLIO VERTICALE (riproduce il layout della webdesk) =====
  // Palette stili AOA (per SheetJS write con cellStyles non garantito su CDN base,
  // quindi usiamo struttura + formati numerici + merge; i colori via fill quando supportati)
  const EURO_Z = '#,##0.00 "€"';

  const buildDaySheet = (it) => {
    const c = calc(it);
    const okIncassi = Math.abs(c.quadraturaIncassi) < 0.02;
    const okContante = Math.abs(c.quadraturaContante) < 0.02;
    const v = (x) => num(x);

    // Costruisco array di righe [label, valore]
    // Uso marcatori di tipo per applicare stili dopo
    const rows = [];
    const meta = []; // tiene traccia del "ruolo" di ogni riga per lo styling

    const pushSection = (title) => {
      rows.push([title, null]);
      meta.push({ type: 'section' });
    };
    const pushItem = (label, value, opts = {}) => {
      rows.push([label, value]);
      meta.push({ type: 'item', money: opts.money !== false, ...opts });
    };
    const pushTotal = (label, value, opts = {}) => {
      rows.push([label, value]);
      meta.push({ type: 'total', money: true, ...opts });
    };
    const pushSpacer = () => {
      rows.push([null, null]);
      meta.push({ type: 'spacer' });
    };
    const pushHeader = (label, value) => {
      rows.push([label, value]);
      meta.push({ type: 'header' });
    };

    // Intestazione
    pushHeader('SACOPH · QUADRATURA CASSA · FIDAMAR', null);
    pushItem('Data', fmtDateIT(it.date), { money: false });
    pushItem('Operatori', it.operatori || '—', { money: false });
    pushSpacer();

    // 1. Incassi per forma di pagamento
    pushSection('INCASSI PER FORMA DI PAGAMENTO');
    pushItem('Contanti', v(it.incassi?.contanti));
    pushItem('POS / Carte', v(it.incassi?.pos));
    pushItem('Satispay', v(it.incassi?.satispay));
    pushItem('Ticket pasto', v(it.incassi?.ticket));
    pushItem('Buoni resi riscossi', v(it.incassi?.buoniResiRiscossi));
    pushItem('Buoni industriali', v(it.incassi?.buoniIndustriali));
    pushItem('Arrotondamenti', v(it.incassi?.arrotondamenti));
    pushTotal('TOTALE INCASSI', c.totIncassi);
    pushSpacer();

    // 2. Corrispettivi
    pushSection('CORRISPETTIVI (VERIFICA INCASSI)');
    pushItem('Corrispettivi da scontrini', c.corrispettivi);
    pushItem('PagoPA', c.pagopa);
    pushItem('Resi emessi', c.resiEmessi);
    pushTotal('TOTALE CORRISPETTIVI', c.totCorrispettivi);
    pushTotal('QUADRATURA INCASSI', c.quadraturaIncassi, { esito: okIncassi });
    pushItem('Esito incassi', okIncassi ? 'OK ✓' : 'KO ✗', { money: false, esito: okIncassi });
    pushSpacer();

    // 3. Apertura
    pushSection('FONDO APERTURA');
    pushItem('Cassaforte', c.apCassaforte);
    pushItem('Glory', c.apGlory);
    pushTotal('TOTALE APERTURA', c.totApertura);
    pushSpacer();

    // 4. Movimenti contante entrata/uscita
    pushSection('MOVIMENTI CONTANTE');
    pushItem('Consegna monete (entrata cassaforte)', v(it.movimenti?.consegnaMonete));
    pushItem('Spese cash (uscita cassaforte)', v(it.movimenti?.speseCash));
    pushItem('Versamento banca (uscita cassaforte)', v(it.movimenti?.versamentoBanca));
    pushItem('Rimborsi cash (uscita cassaforte)', v(it.movimenti?.rimborsiCash));
    pushItem('Ritiro valori (uscita glory)', v(it.movimenti?.ritiroValori));
    pushSpacer();

    // 5. Trasferimenti interni
    pushSection('TRASFERIMENTI INTERNI');
    pushItem('Rifornimento glory (cassaforte → glory)', v(it.interni?.rifornimentoGlory));
    pushItem('Svuotamento glory (glory → cassaforte)', v(it.interni?.svuotamentoGlory));
    pushSpacer();

    // 6. Chiusura fisica
    pushSection('FONDO FISICO CHIUSURA');
    pushItem('Cassaforte conteggiata', c.fisCassaforte);
    pushItem('Glory', c.fisGlory);
    pushTotal('TOTALE FISICO', c.fisicoTot);
    pushSpacer();

    // 7. Quadratura contante
    pushSection('QUADRATURA CONTANTE');
    pushItem('Teorico cassaforte', c.teoricoCassaforte);
    pushItem('Teorico glory', c.teoricoGlory);
    pushTotal('TOTALE TEORICO', c.teoricoTot);
    pushTotal('TOTALE FISICO', c.fisicoTot);
    pushItem('Differenza cassaforte', c.diffCassaforte);
    pushItem('Differenza glory', c.diffGlory);
    pushTotal('QUADRATURA CONTANTE', c.quadraturaContante, { esito: okContante });
    pushItem('Esito contante', okContante ? 'OK ✓' : 'KO ✗', { money: false, esito: okContante });
    pushSpacer();

    // Note
    pushSection('NOTE');
    pushItem(it.note || '—', null, { money: false, fullwidth: true });

    // Costruisco worksheet da AOA
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{ wch: 42 }, { wch: 18 }];

    // Applico formati e stili cella per cella
    const merges = [];
    for (let R = 0; R < rows.length; R++) {
      const m = meta[R];
      const cellA = ws[XLSX.utils.encode_cell({ r: R, c: 0 })];
      const cellB = ws[XLSX.utils.encode_cell({ r: R, c: 1 })];

      if (m.type === 'header') {
        merges.push({ s: { r: R, c: 0 }, e: { r: R, c: 1 } });
        if (cellA) cellA.s = {
          font: { bold: true, sz: 14, color: { rgb: 'FFFFFF' } },
          fill: { fgColor: { rgb: '0F172A' } },
          alignment: { horizontal: 'center', vertical: 'center' }
        };
      } else if (m.type === 'section') {
        merges.push({ s: { r: R, c: 0 }, e: { r: R, c: 1 } });
        if (cellA) cellA.s = {
          font: { bold: true, sz: 11, color: { rgb: 'FFFFFF' } },
          fill: { fgColor: { rgb: '1F3864' } },
          alignment: { horizontal: 'left', vertical: 'center' }
        };
      } else if (m.type === 'total') {
        const esitoColor = m.esito === true ? '006100' : (m.esito === false ? '9C0006' : '1F3864');
        const esitoFill = m.esito === true ? 'C6EFCE' : (m.esito === false ? 'FFC7CE' : 'D9E2F3');
        if (cellA) cellA.s = {
          font: { bold: true, sz: 11, color: { rgb: esitoColor } },
          fill: { fgColor: { rgb: esitoFill } }
        };
        if (cellB) {
          cellB.s = {
            font: { bold: true, sz: 11, color: { rgb: esitoColor } },
            fill: { fgColor: { rgb: esitoFill } },
            alignment: { horizontal: 'right' }
          };
          if (m.money && typeof cellB.v === 'number') { cellB.t = 'n'; cellB.z = EURO_Z; }
        }
      } else if (m.type === 'item') {
        const thinBorder = { style: 'thin', color: { rgb: 'E2E8F0' } };
        const borders = { bottom: thinBorder };
        if (m.fullwidth) {
          merges.push({ s: { r: R, c: 0 }, e: { r: R, c: 1 } });
          if (cellA) cellA.s = { alignment: { horizontal: 'left', wrapText: true, vertical: 'top' } };
        } else {
          const esitoColor = m.esito === true ? '006100' : (m.esito === false ? '9C0006' : '334155');
          if (cellA) cellA.s = { font: { sz: 10, color: { rgb: '334155' } }, alignment: { horizontal: 'left' }, border: borders };
          if (cellB) {
            cellB.s = {
              font: { sz: 10, color: { rgb: esitoColor }, bold: m.esito !== undefined },
              alignment: { horizontal: 'right' },
              border: borders
            };
            if (m.money && typeof cellB.v === 'number') { cellB.t = 'n'; cellB.z = EURO_Z; }
          }
        }
      }
    }
    ws['!merges'] = merges;
    // Altezze righe: header alto, sezioni medie
    const rowHeights = meta.map(m => {
      if (m.type === 'header') return { hpt: 28 };
      if (m.type === 'section') return { hpt: 20 };
      if (m.type === 'spacer') return { hpt: 6 };
      return { hpt: 16 };
    });
    ws['!rows'] = rowHeights;
    return ws;
  };

  // ===== FOGLIO RIEPILOGO (orizzontale, tabellare) =====
  const buildSummarySheet = (records) => {
    const rows = records.map(flattenForExcel);
    const ws = XLSX.utils.json_to_sheet(rows, { cellDates: true });
    const colWidths = Object.keys(rows[0] || {}).map(k => ({ wch: Math.max(k.length, 14) }));
    ws['!cols'] = colWidths;
    const range = XLSX.utils.decode_range(ws['!ref']);
    const headerRow = rows[0] ? Object.keys(rows[0]) : [];
    const textCols = ['Data', 'Operatori', 'Esito incassi', 'Esito contante', 'Stato giornata', 'Note'];
    // Header styling
    for (let C = 0; C <= range.e.c; ++C) {
      const cell = ws[XLSX.utils.encode_cell({ r: 0, c: C })];
      if (cell) cell.s = {
        font: { bold: true, sz: 10, color: { rgb: 'FFFFFF' } },
        fill: { fgColor: { rgb: '1F3864' } },
        alignment: { horizontal: 'center', wrapText: true }
      };
    }
    for (let R = 1; R <= range.e.r; ++R) {
      for (let C = 0; C <= range.e.c; ++C) {
        const cell = ws[XLSX.utils.encode_cell({ r: R, c: C })];
        if (!cell) continue;
        const header = headerRow[C] || '';
        if (header === 'Data' && cell.v instanceof Date) {
          cell.t = 'd'; cell.z = 'dd/mm/yyyy';
        } else if (!textCols.includes(header) && typeof cell.v === 'number') {
          cell.t = 'n'; cell.z = EURO_Z;
        }
      }
    }
    ws['!freeze'] = { xSplit: 1, ySplit: 1 };
    return ws;
  };

  // Nome foglio valido (max 31 char, no caratteri vietati)
  const safeSheetName = (name) => name.replace(/[\\/?*\[\]:]/g, '-').slice(0, 31);

  const buildWorkbook = (records) => {
    if (!XLSX || !XLSX.utils) {
      alert('La libreria Excel non si è caricata correttamente. Controlla la connessione e ricarica la pagina.');
      throw new Error('XLSX.utils undefined');
    }
    const wb = XLSX.utils.book_new();
    const sorted = [...records].sort((a, b) => a.date.localeCompare(b.date));
    // Un foglio per ogni giorno
    sorted.forEach(it => {
      const ws = buildDaySheet(it);
      XLSX.utils.book_append_sheet(wb, ws, safeSheetName(fmtDateIT(it.date)));
    });
    // Foglio riepilogo solo se più di un giorno
    if (sorted.length > 1) {
      const summary = buildSummarySheet(sorted);
      XLSX.utils.book_append_sheet(wb, summary, 'Riepilogo');
    }
    return wb;
  };

  const downloadWorkbook = (wb, filename) => {
    XLSX.writeFile(wb, filename);
    setLastExportDate(today());
  };

  const exportExcelGiorno = async (date) => {
    const data = await db.get(date);
    if (!data) { alert('Nessuna quadratura per questa data.'); return; }
    const wb = buildWorkbook([{ date, ...data }]);
    downloadWorkbook(wb, `quadratura_${date}.xlsx`);
  };

  const exportExcelPeriodo = async (from, to, label) => {
    const all = await db.getAll();
    const filtered = all.filter(it => it.date >= from && it.date <= to)
      .sort((a, b) => a.date.localeCompare(b.date));
    if (filtered.length === 0) { alert('Nessuna quadratura in questo periodo.'); return; }
    const wb = buildWorkbook(filtered);
    downloadWorkbook(wb, `quadrature_${label.replace(/\s+/g, '_').toLowerCase()}.xlsx`);
  };

  const exportExcelOggi = () => exportExcelGiorno(today());

  const exportExcelSettimana = async () => {
    const d = new Date();
    const day = d.getDay() || 7; // Domenica = 7
    const monday = new Date(d);
    monday.setDate(d.getDate() - day + 1);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const from = toLocalISO(monday);
    const to = toLocalISO(sunday);
    await exportExcelPeriodo(from, to, `settimana_${from}`);
  };

  const exportExcelMese = async () => {
    const d = new Date();
    const from = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
    const lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
    const to = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
    await exportExcelPeriodo(from, to, `${monthName(d.getMonth())}_${d.getFullYear()}`);
  };

  const exportExcelTutto = async () => {
    const all = await db.getAll();
    if (all.length === 0) { alert('Archivio vuoto.'); return; }
    const sorted = [...all].sort((a, b) => a.date.localeCompare(b.date));
    const wb = buildWorkbook(sorted);
    downloadWorkbook(wb, `archivio_completo_${today()}.xlsx`);
  };

  // ===================== EXPORT PDF =====================
  // Colori (RGB) coerenti con la webdesk
  const PDF_COLORS = {
    navy: [15, 23, 42],        // slate-900
    section: [31, 56, 100],    // blu sezione
    headerBg: [217, 226, 243], // azzurro chiaro
    okText: [0, 97, 0], okBg: [198, 239, 206],
    koText: [156, 0, 6], koBg: [255, 199, 206],
    totalBg: [217, 226, 243],
    grey: [100, 116, 139],
    line: [226, 232, 240]
  };

  const eur = (n) => {
    if (n === null || n === undefined || isNaN(n)) return '0,00 €';
    return new Intl.NumberFormat('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n) + ' €';
  };

  // Disegna una pagina-giorno verticale nel doc PDF (a partire da y iniziale)
  const renderDayPage = (doc, it) => {
    const c = calc(it);
    const okIncassi = Math.abs(c.quadraturaIncassi) < 0.02;
    const okContante = Math.abs(c.quadraturaContante) < 0.02;
    const v = (x) => num(x);

    const pageW = doc.internal.pageSize.getWidth();
    const margin = 40;
    const contentW = pageW - margin * 2;
    let y = margin;

    // Intestazione con barra blu brand
    doc.setFillColor(...PDF_COLORS.navy);
    doc.rect(margin, y, contentW, 40, 'F');
    // Badge bianco con logo a sinistra
    doc.setFillColor(255, 255, 255);
    doc.roundedRect(margin + 8, y + 6, 96, 28, 3, 3, 'F');
    try {
      // logo: ratio ~281x96 -> in 88x30 mantengo proporzioni (~88x30)
      doc.addImage(LOGO_SACOPH, 'PNG', margin + 12, y + 9, 88, 22);
    } catch (e) { /* se il logo non carica, ignoro */ }
    // Titolo a destra del badge
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.text('QUADRATURA CASSA', pageW - margin - 8, y + 18, { align: 'right' });
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text('Punto vendita FIDAMAR', pageW - margin - 8, y + 31, { align: 'right' });
    y += 48;

    // Data + operatori
    doc.setTextColor(51, 65, 85);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.text(`Data: ${fmtDateIT(it.date)}`, margin, y);
    doc.text(`Operatori: ${it.operatori || '-'}`, pageW - margin, y, { align: 'right' });
    y += 16;

    // Helper: sezione (titolo blu a tutta larghezza)
    const section = (title) => {
      doc.setFillColor(...PDF_COLORS.section);
      doc.rect(margin, y, contentW, 18, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9.5);
      doc.text(title, margin + 6, y + 12.5);
      y += 18;
    };

    // Helper: riga voce (label sx, valore dx)
    const item = (label, value, opts = {}) => {
      const h = 15;
      doc.setDrawColor(...PDF_COLORS.line);
      doc.setLineWidth(0.5);
      doc.line(margin, y + h, margin + contentW, y + h);
      doc.setFont('helvetica', opts.bold ? 'bold' : 'normal');
      doc.setFontSize(9);
      const txtColor = opts.esito === true ? PDF_COLORS.okText
        : opts.esito === false ? PDF_COLORS.koText : [51, 65, 85];
      doc.setTextColor(...(opts.labelGrey ? PDF_COLORS.grey : [51, 65, 85]));
      doc.text(String(label), margin + 6, y + 10);
      if (value !== null && value !== undefined) {
        doc.setTextColor(...txtColor);
        doc.setFont('helvetica', opts.bold || opts.esito !== undefined ? 'bold' : 'normal');
        const valTxt = opts.raw ? String(value) : eur(value);
        doc.text(valTxt, margin + contentW - 6, y + 10, { align: 'right' });
      }
      y += h;
    };

    // Helper: riga totale (sfondo azzurro o colore esito)
    const total = (label, value, opts = {}) => {
      const h = 17;
      let bg = PDF_COLORS.totalBg, fg = PDF_COLORS.section;
      if (opts.esito === true) { bg = PDF_COLORS.okBg; fg = PDF_COLORS.okText; }
      if (opts.esito === false) { bg = PDF_COLORS.koBg; fg = PDF_COLORS.koText; }
      doc.setFillColor(...bg);
      doc.rect(margin, y, contentW, h, 'F');
      doc.setTextColor(...fg);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9.5);
      doc.text(String(label), margin + 6, y + 11.5);
      if (value !== null && value !== undefined) {
        doc.text(eur(value), margin + contentW - 6, y + 11.5, { align: 'right' });
      }
      y += h;
    };

    const spacer = (px = 8) => { y += px; };

    // 1. INCASSI
    section('INCASSI PER FORMA DI PAGAMENTO');
    item('Contanti', v(it.incassi?.contanti), { labelGrey: true });
    item('POS / Carte', v(it.incassi?.pos), { labelGrey: true });
    item('Satispay', v(it.incassi?.satispay), { labelGrey: true });
    item('Ticket pasto', v(it.incassi?.ticket), { labelGrey: true });
    item('Buoni resi riscossi', v(it.incassi?.buoniResiRiscossi), { labelGrey: true });
    item('Buoni industriali', v(it.incassi?.buoniIndustriali), { labelGrey: true });
    item('Arrotondamenti', v(it.incassi?.arrotondamenti), { labelGrey: true });
    total('TOTALE INCASSI', c.totIncassi);
    spacer();

    // 2. CORRISPETTIVI
    section('CORRISPETTIVI (VERIFICA INCASSI)');
    item('Corrispettivi da scontrini', c.corrispettivi, { labelGrey: true });
    item('PagoPA', c.pagopa, { labelGrey: true });
    item('Resi emessi', c.resiEmessi, { labelGrey: true });
    total('TOTALE CORRISPETTIVI', c.totCorrispettivi);
    total('QUADRATURA INCASSI', c.quadraturaIncassi, { esito: okIncassi });
    item('Esito incassi', okIncassi ? 'OK' : 'KO', { raw: true, esito: okIncassi, labelGrey: true });
    spacer();

    // 3. APERTURA
    section('FONDO APERTURA');
    item('Cassaforte', c.apCassaforte, { labelGrey: true });
    item('Glory', c.apGlory, { labelGrey: true });
    total('TOTALE APERTURA', c.totApertura);
    spacer();

    // 4. MOVIMENTI CONTANTE
    section('MOVIMENTI CONTANTE');
    item('Consegna monete (entrata cassaforte)', v(it.movimenti?.consegnaMonete), { labelGrey: true });
    item('Spese cash (uscita cassaforte)', v(it.movimenti?.speseCash), { labelGrey: true });
    item('Versamento banca (uscita cassaforte)', v(it.movimenti?.versamentoBanca), { labelGrey: true });
    item('Rimborsi cash (uscita cassaforte)', v(it.movimenti?.rimborsiCash), { labelGrey: true });
    item('Ritiro valori (uscita glory)', v(it.movimenti?.ritiroValori), { labelGrey: true });
    spacer();

    // 5. TRASFERIMENTI INTERNI
    section('TRASFERIMENTI INTERNI');
    item('Rifornimento glory (cassaforte -> glory)', v(it.interni?.rifornimentoGlory), { labelGrey: true });
    item('Svuotamento glory (glory -> cassaforte)', v(it.interni?.svuotamentoGlory), { labelGrey: true });
    spacer();

    // 6. FISICO CHIUSURA
    section('FONDO FISICO CHIUSURA');
    item('Cassaforte conteggiata', c.fisCassaforte, { labelGrey: true });
    item('Glory', c.fisGlory, { labelGrey: true });
    total('TOTALE FISICO', c.fisicoTot);
    spacer();

    // 7. QUADRATURA CONTANTE
    section('QUADRATURA CONTANTE');
    item('Teorico cassaforte', c.teoricoCassaforte, { labelGrey: true });
    item('Teorico glory', c.teoricoGlory, { labelGrey: true });
    total('TOTALE TEORICO', c.teoricoTot);
    total('TOTALE FISICO', c.fisicoTot);
    item('Differenza cassaforte', c.diffCassaforte, { labelGrey: true });
    item('Differenza glory', c.diffGlory, { labelGrey: true });
    total('QUADRATURA CONTANTE', c.quadraturaContante, { esito: okContante });
    item('Esito contante', okContante ? 'OK' : 'KO', { raw: true, esito: okContante, labelGrey: true });

    // Note (se presenti)
    if (it.note && it.note.trim()) {
      spacer();
      section('NOTE');
      doc.setTextColor(51, 65, 85);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      const lines = doc.splitTextToSize(it.note, contentW - 12);
      doc.text(lines, margin + 6, y + 11);
    }
  };

  // Pagina riepilogo tabellare (orizzontale)
  const renderSummaryPage = (doc, records) => {
    doc.addPage('a4', 'landscape');
    const pageW = doc.internal.pageSize.getWidth();
    doc.setFillColor(...PDF_COLORS.navy);
    doc.rect(40, 30, pageW - 80, 40, 'F');
    doc.setFillColor(255, 255, 255);
    doc.roundedRect(48, 36, 96, 28, 3, 3, 'F');
    try {
      doc.addImage(LOGO_SACOPH, 'PNG', 52, 39, 88, 22);
    } catch (e) { /* ignoro */ }
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.text('RIEPILOGO QUADRATURE', pageW - 48, 50, { align: 'right' });
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text('Punto vendita FIDAMAR', pageW - 48, 63, { align: 'right' });

    const head = [['Data', 'Operatori', 'Tot. incassi', 'Tot. corrisp.', 'Q. incassi', 'Teorico', 'Fisico', 'Q. contante', 'Stato']];
    const body = records.map(it => {
      const c = calc(it);
      const ok = Math.abs(c.quadraturaContante) < 0.02 && Math.abs(c.quadraturaIncassi) < 0.02;
      return [
        fmtDateIT(it.date),
        it.operatori || '-',
        eur(c.totIncassi),
        eur(c.totCorrispettivi),
        eur(c.quadraturaIncassi),
        eur(c.teoricoTot),
        eur(c.fisicoTot),
        eur(c.quadraturaContante),
        ok ? 'OK' : 'KO'
      ];
    });

    const tableOpts = {
      head, body,
      startY: 84,
      margin: { left: 40, right: 40 },
      styles: { fontSize: 8, cellPadding: 4, font: 'helvetica' },
      headStyles: { fillColor: PDF_COLORS.section, textColor: [255, 255, 255], fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [248, 250, 252] },
      columnStyles: {
        2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' },
        5: { halign: 'right' }, 6: { halign: 'right' }, 7: { halign: 'right' },
        8: { halign: 'center', fontStyle: 'bold' }
      },
      didParseCell: (data) => {
        if (data.section === 'body' && data.column.index === 8) {
          if (data.cell.raw === 'OK') {
            data.cell.styles.textColor = PDF_COLORS.okText;
            data.cell.styles.fillColor = PDF_COLORS.okBg;
          } else {
            data.cell.styles.textColor = PDF_COLORS.koText;
            data.cell.styles.fillColor = PDF_COLORS.koBg;
          }
        }
      }
    };
    // autoTable può essere funzione standalone o metodo del doc, a seconda del bundle
    if (typeof autoTable === 'function') {
      autoTable(doc, tableOpts);
    } else if (typeof doc.autoTable === 'function') {
      doc.autoTable(tableOpts);
    }
  };

  const buildPDF = (records) => {
    const sorted = [...records].sort((a, b) => a.date.localeCompare(b.date));
    const doc = new jsPDF({ unit: 'pt', format: 'a4', orientation: 'portrait' });
    sorted.forEach((it, idx) => {
      if (idx > 0) doc.addPage('a4', 'portrait');
      renderDayPage(doc, it);
    });
    if (sorted.length > 1) {
      renderSummaryPage(doc, sorted);
    }
    return doc;
  };

  const downloadPDF = (doc, filename) => {
    doc.save(filename);
    setLastExportDate(today());
  };

  const exportPdfGiorno = async (date) => {
    const data = await db.get(date);
    if (!data) { alert('Nessuna quadratura per questa data.'); return; }
    const doc = buildPDF([{ date, ...data }]);
    downloadPDF(doc, `quadratura_${date}.pdf`);
  };

  const exportPdfPeriodo = async (from, to, label) => {
    const all = await db.getAll();
    const filtered = all.filter(it => it.date >= from && it.date <= to)
      .sort((a, b) => a.date.localeCompare(b.date));
    if (filtered.length === 0) { alert('Nessuna quadratura in questo periodo.'); return; }
    const doc = buildPDF(filtered);
    downloadPDF(doc, `quadrature_${label.replace(/\s+/g, '_').toLowerCase()}.pdf`);
  };

  const exportPdfOggi = () => exportPdfGiorno(today());

  const exportPdfSettimana = async () => {
    const d = new Date();
    const day = d.getDay() || 7;
    const monday = new Date(d);
    monday.setDate(d.getDate() - day + 1);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    await exportPdfPeriodo(toLocalISO(monday), toLocalISO(sunday), `settimana_${toLocalISO(monday)}`);
  };

  const exportPdfMese = async () => {
    const d = new Date();
    const from = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
    const lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
    const to = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
    await exportPdfPeriodo(from, to, `${monthName(d.getMonth())}_${d.getFullYear()}`);
  };

  const exportPdfTutto = async () => {
    const all = await db.getAll();
    if (all.length === 0) { alert('Archivio vuoto.'); return; }
    const doc = buildPDF(all);
    downloadPDF(doc, `archivio_completo_${today()}.pdf`);
  };

  // Export intervallo personalizzato (Da / A)
  const validateRange = () => {
    if (!rangeFrom || !rangeTo) {
      alert('Seleziona entrambe le date (Da e A).');
      return null;
    }
    let from = rangeFrom, to = rangeTo;
    if (from > to) { [from, to] = [to, from]; } // inverto se sbagliate
    return { from, to };
  };

  const exportRangePdf = async () => {
    const r = validateRange();
    if (!r) return;
    setExportMenuOpen(false);
    await exportPdfPeriodo(r.from, r.to, `dal_${r.from}_al_${r.to}`);
  };

  const exportRangeExcel = async () => {
    const r = validateRange();
    if (!r) return;
    setExportMenuOpen(false);
    await exportExcelPeriodo(r.from, r.to, `dal_${r.from}_al_${r.to}`);
  };

  const importJSON = async (file) => {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data)) {
        alert('Formato file non valido: serve un array di quadrature.');
        return;
      }
      const result = await db.importBatch(data);
      handleSaved();
      alert(`Importazione completata.\n${result.added} nuove quadrature\n${result.updated} aggiornate`);
    } catch (e) {
      alert('Errore durante l\'importazione: ' + e.message);
    }
  };

  return (
    <div className="min-h-screen bg-slate-50">
      <header className="border-b border-slate-800" style={{ background: 'linear-gradient(135deg, #0a2a5e 0%, #00327D 55%, #0a2a5e 100%)' }}>
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
          <div className="flex items-center gap-4">
            <div className="bg-white rounded-xl px-3 py-2 shadow-lg shadow-black/20 flex items-center" style={{ height: '56px' }}>
              <img src={LOGO_SACOPH} alt="SACOPH" style={{ height: '40px', width: 'auto', display: 'block' }} />
            </div>
            <div className="hidden sm:block">
              <div className="text-lg font-bold tracking-tight text-white leading-tight">Quadratura cassa</div>
              <div className="text-xs uppercase tracking-[0.15em] text-white/60 font-medium">
                Punto vendita · FIDAMAR
              </div>
            </div>
          </div>
          <div className="flex items-center gap-2 relative">
            <label className="inline-flex items-center gap-2 px-3 py-2 text-sm bg-white/10 hover:bg-white/20 rounded-md transition border border-white/15 cursor-pointer text-white">
              <Upload size={14} /> <span className="hidden sm:inline">Importa</span>
              <input type="file" accept="application/json,.json" className="hidden"
                onChange={e => {
                  const f = e.target.files?.[0];
                  if (f) importJSON(f);
                  e.target.value = '';
                }} />
            </label>
            <div className="relative">
              <button onClick={() => setExportMenuOpen(o => !o)}
                className="inline-flex items-center gap-2 px-3 py-2 text-sm bg-white text-[#00327D] hover:bg-slate-100 rounded-md transition font-semibold">
                <Download size={14} /> Esporta ▾
              </button>
              {exportMenuOpen && (
                <>
                  <div className="fixed inset-0 z-10" onClick={() => setExportMenuOpen(false)} />
                  <div className="absolute right-0 top-full mt-2 w-80 bg-white border border-slate-200 rounded-lg shadow-xl z-20 overflow-hidden text-slate-800 max-h-[80vh] overflow-y-auto">
                    {/* PDF */}
                    <div className="px-3 py-2 text-xs uppercase tracking-wider text-slate-500 font-semibold bg-rose-50 border-b border-rose-100 flex items-center gap-2">
                      <FileText size={13} className="text-rose-600" /> PDF (non modificabile, per archivio)
                    </div>
                    <button onClick={() => { setExportMenuOpen(false); exportPdfOggi(); }}
                      className="w-full text-left px-3 py-2.5 hover:bg-rose-50 text-sm flex items-center gap-2 transition">
                      <FileText size={16} className="text-rose-600" />
                      <div>
                        <div className="font-medium">Quadratura di oggi</div>
                        <div className="text-xs text-slate-500">Solo {fmtDateIT(today())}</div>
                      </div>
                    </button>
                    <button onClick={() => { setExportMenuOpen(false); exportPdfGiorno(selectedDate); }}
                      className="w-full text-left px-3 py-2.5 hover:bg-rose-50 text-sm flex items-center gap-2 transition">
                      <FileText size={16} className="text-rose-600" />
                      <div>
                        <div className="font-medium">Giorno selezionato</div>
                        <div className="text-xs text-slate-500">{fmtDateIT(selectedDate)}</div>
                      </div>
                    </button>
                    <button onClick={() => { setExportMenuOpen(false); exportPdfSettimana(); }}
                      className="w-full text-left px-3 py-2.5 hover:bg-rose-50 text-sm flex items-center gap-2 transition">
                      <CalendarIcon size={16} className="text-rose-600" />
                      <div className="font-medium">Settimana corrente</div>
                    </button>
                    <button onClick={() => { setExportMenuOpen(false); exportPdfMese(); }}
                      className="w-full text-left px-3 py-2.5 hover:bg-rose-50 text-sm flex items-center gap-2 transition">
                      <CalendarIcon size={16} className="text-rose-600" />
                      <div className="font-medium">Mese corrente</div>
                    </button>
                    <button onClick={() => { setExportMenuOpen(false); exportPdfTutto(); }}
                      className="w-full text-left px-3 py-2.5 hover:bg-rose-50 text-sm flex items-center gap-2 transition border-b border-slate-100">
                      <FileText size={16} className="text-rose-600" />
                      <div className="font-medium">Tutto l'archivio</div>
                    </button>

                    {/* Excel */}
                    <div className="px-3 py-2 text-xs uppercase tracking-wider text-slate-500 font-semibold bg-emerald-50 border-b border-t border-emerald-100 flex items-center gap-2">
                      <FileSpreadsheet size={13} className="text-emerald-600" /> Excel (modificabile)
                    </div>
                    <button onClick={() => { setExportMenuOpen(false); exportExcelOggi(); }}
                      className="w-full text-left px-3 py-2.5 hover:bg-emerald-50 text-sm flex items-center gap-2 transition">
                      <FileSpreadsheet size={16} className="text-emerald-600" />
                      <div>
                        <div className="font-medium">Quadratura di oggi</div>
                        <div className="text-xs text-slate-500">Solo {fmtDateIT(today())}</div>
                      </div>
                    </button>
                    <button onClick={() => { setExportMenuOpen(false); exportExcelGiorno(selectedDate); }}
                      className="w-full text-left px-3 py-2.5 hover:bg-emerald-50 text-sm flex items-center gap-2 transition">
                      <FileSpreadsheet size={16} className="text-emerald-600" />
                      <div>
                        <div className="font-medium">Giorno selezionato</div>
                        <div className="text-xs text-slate-500">{fmtDateIT(selectedDate)}</div>
                      </div>
                    </button>
                    <button onClick={() => { setExportMenuOpen(false); exportExcelSettimana(); }}
                      className="w-full text-left px-3 py-2.5 hover:bg-emerald-50 text-sm flex items-center gap-2 transition">
                      <CalendarIcon size={16} className="text-emerald-600" />
                      <div className="font-medium">Settimana corrente</div>
                    </button>
                    <button onClick={() => { setExportMenuOpen(false); exportExcelMese(); }}
                      className="w-full text-left px-3 py-2.5 hover:bg-emerald-50 text-sm flex items-center gap-2 transition">
                      <CalendarIcon size={16} className="text-emerald-600" />
                      <div className="font-medium">Mese corrente</div>
                    </button>
                    <button onClick={() => { setExportMenuOpen(false); exportExcelTutto(); }}
                      className="w-full text-left px-3 py-2.5 hover:bg-emerald-50 text-sm flex items-center gap-2 transition border-b border-slate-100">
                      <FileSpreadsheet size={16} className="text-emerald-600" />
                      <div className="font-medium">Tutto l'archivio</div>
                    </button>

                    {/* Intervallo personalizzato */}
                    <div className="px-3 py-2 text-xs uppercase tracking-wider text-slate-500 font-semibold bg-blue-50 border-b border-t border-blue-100 flex items-center gap-2">
                      <CalendarIcon size={13} className="text-[#00327D]" /> Intervallo personalizzato
                    </div>
                    <div className="px-3 py-3 space-y-2" onClick={e => e.stopPropagation()}>
                      <div className="flex items-center gap-2">
                        <label className="text-xs text-slate-500 w-8">Da</label>
                        <input type="date" value={rangeFrom}
                          onChange={e => setRangeFrom(e.target.value)}
                          className="flex-1 text-sm border border-slate-200 rounded px-2 py-1.5 focus:outline-none focus:border-[#00327D]" />
                      </div>
                      <div className="flex items-center gap-2">
                        <label className="text-xs text-slate-500 w-8">A</label>
                        <input type="date" value={rangeTo}
                          onChange={e => setRangeTo(e.target.value)}
                          className="flex-1 text-sm border border-slate-200 rounded px-2 py-1.5 focus:outline-none focus:border-[#00327D]" />
                      </div>
                      <div className="flex items-center gap-2 pt-1">
                        <button onClick={exportRangePdf}
                          className="flex-1 inline-flex items-center justify-center gap-1.5 px-2 py-2 bg-rose-50 hover:bg-rose-100 text-rose-700 rounded text-xs font-semibold transition border border-rose-200">
                          <FileText size={14} /> PDF
                        </button>
                        <button onClick={exportRangeExcel}
                          className="flex-1 inline-flex items-center justify-center gap-1.5 px-2 py-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded text-xs font-semibold transition border border-emerald-200">
                          <FileSpreadsheet size={14} /> Excel
                        </button>
                      </div>
                    </div>

                    {/* Backup */}
                    <div className="px-3 py-2 text-xs uppercase tracking-wider text-slate-500 font-semibold bg-slate-50 border-b border-t border-slate-200">
                      Backup tecnico
                    </div>
                    <button onClick={() => { setExportMenuOpen(false); exportJSON(); }}
                      className="w-full text-left px-3 py-2.5 hover:bg-slate-50 text-sm flex items-center gap-2 transition">
                      <FileText size={16} className="text-slate-500" />
                      <div>
                        <div className="font-medium">Backup JSON</div>
                        <div className="text-xs text-slate-500">Per ripristino completo</div>
                      </div>
                    </button>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-6 flex items-center gap-1">
          {[
            { v: 'inserimento', l: 'Quadratura giornaliera', icon: FileText },
            { v: 'archivio', l: 'Archivio', icon: Archive },
            { v: 'statistiche', l: 'Statistiche', icon: BarChart3 }
          ].map(t => (
            <button key={t.v} onClick={() => setTab(t.v)}
              className={`inline-flex items-center gap-2 px-4 py-3 text-sm font-medium transition border-b-2 ${
                tab === t.v ? 'border-white text-white' : 'border-transparent text-white/60 hover:text-white'
              }`}>
              <t.icon size={16} /> {t.l}
            </button>
          ))}
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-6">
        {showExportReminder && (
          <div className="mb-4 bg-amber-50 border border-amber-200 rounded-lg p-3 flex items-center justify-between gap-3 flex-wrap">
            <div className="flex items-center gap-3">
              <AlertTriangle size={18} className="text-amber-600 flex-shrink-0" />
              <div className="text-sm">
                <span className="font-semibold text-amber-900">Promemoria:</span>
                <span className="text-amber-800 ml-1">
                  hai inserito la quadratura di oggi ma non l'hai ancora esportata per la cartella condivisa.
                </span>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={() => exportExcelOggi()}
                className="inline-flex items-center gap-2 px-3 py-1.5 bg-amber-600 hover:bg-amber-700 text-white rounded text-sm font-semibold transition">
                <FileSpreadsheet size={14} /> Esporta ora
              </button>
              <button onClick={() => setLastExportDate(today())}
                className="text-amber-700 hover:text-amber-900 text-xs underline">
                Ignora
              </button>
            </div>
          </div>
        )}
        {tab === 'inserimento' && (
          <div className="grid grid-cols-1 xl:grid-cols-[1fr_320px] gap-6">
            <QuadraturaForm initialDate={selectedDate} onSaved={handleSaved} key={selectedDate} />
            <aside>
              <Calendario items={items} onSelect={setSelectedDate} selectedDate={selectedDate} />
              <div className="mt-4 bg-white border border-slate-200 rounded-lg p-4">
                <div className="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-3">Ultime quadrature</div>
                <div className="space-y-2">
                  {items.slice(0, 5).map(it => {
                    const c = calc(it);
                    const ok = Math.abs(c.quadraturaContante) < 0.02 && Math.abs(c.quadraturaIncassi) < 0.02;
                    return (
                      <button key={it.date} onClick={() => setSelectedDate(it.date)}
                        className="w-full text-left flex items-center justify-between p-2 hover:bg-slate-50 rounded transition">
                        <span className="text-sm font-mono">{fmtDateIT(it.date)}</span>
                        <span className={`text-xs font-semibold ${ok ? 'text-emerald-600' : 'text-rose-600'}`}>
                          {ok ? '✓' : '✗'}
                        </span>
                      </button>
                    );
                  })}
                  {items.length === 0 && (
                    <div className="text-xs text-slate-400 text-center py-4">Nessuna quadratura ancora</div>
                  )}
                </div>
              </div>
            </aside>
          </div>
        )}
        {tab === 'archivio' && (
          <Archivio items={items} onSelect={(d) => { setSelectedDate(d); setTab('inserimento'); }} />
        )}
        {tab === 'statistiche' && (
          <Statistiche items={items} />
        )}
      </main>

      <footer className="max-w-7xl mx-auto px-6 py-6 text-xs text-slate-400 text-center">
        SACOPH · Quadratura cassa · Punto vendita FIDAMAR · v2
        <div className="mt-1 text-slate-300">Dati locali al browser · Esporta ogni giorno nella cartella condivisa</div>
      </footer>
    </div>
  );
}

// Mount
const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(<App />);
// Nascondi loader dopo il primo render
requestAnimationFrame(() => {
  document.getElementById('loader')?.classList.add('hidden');
});
</script>
<script>
// Fallback se Babel fallisce
window.addEventListener('error', (e) => {
  const loader = document.getElementById('loader');
  if (loader && !loader.classList.contains('hidden')) {
    loader.innerHTML = '<div style="color:#dc2626;font-size:14px;max-width:400px;text-align:center;padding:20px">Errore caricamento. Ricarica la pagina o controlla la connessione.<br><br><code style="font-size:12px;color:#64748b">' + (e.message || '') + '</code></div>';
  }
});
</script>
</body>
</html>
